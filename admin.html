<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Team Frontier Admin</title>

<link rel="stylesheet" href="style.css">

<style>

body{

background:#111;
color:white;
font-family:sans-serif;
padding:30px;

}


h1{

color:#ffd400;

}


.adminCard{

border:1px solid #ffd400;
padding:20px;
max-width:500px;
margin-top:30px;

}


.section{

margin-top:20px;
padding:15px;
background:#1b1b1b;

}


input{

width:70%;
padding:10px;

background:#222;
color:white;

border:1px solid #555;

}


button{

padding:10px;

background:#ffd400;
border:none;

cursor:pointer;

}


.record{

margin-top:10px;
padding:8px;

background:#333;

}


.warning{

color:#ff5555;

}


</style>

</head>


<body>


<h1>
TEAM FRONTIER<br>
ADMIN CONTROL
</h1>


<div class="adminCard">


<h2>
눈꽃
</h2>


<p>
관리진
</p>



<div class="section">


<h3>
특이사항
</h3>


<input
id="noteInput"
placeholder="특이사항 입력">


<button onclick="addNote()">
추가
</button>


<div id="noteList">

</div>


</div>




<div class="section">


<h3>
경고 기록
</h3>


<input
id="warningInput"
placeholder="경고 내용 입력">


<button onclick="addWarning()">
추가
</button>


<div id="warningList">

</div>


</div>


</div>



<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import {

getFirestore,

collection,

addDoc,

getDocs

}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";



const firebaseConfig = {


apiKey: "AIzaSyCwxwFTyF-qam5EP-7FKXdWri4kanKZlyI",

authDomain: "teamfrontier-34b24.firebaseapp.com",

projectId: "teamfrontier-34b24",

storageBucket: "teamfrontier-34b24.firebasestorage.app",

messagingSenderId: "1053293310511",

appId: "1:1053293310511:web:001f2684244ff9ebb40cda"


};



const app = initializeApp(firebaseConfig);


const db = getFirestore(app);



// =====================
// 특이사항 추가
// =====================


window.addNote = async function(){


const input =
document.getElementById("noteInput");


if(input.value==="") return;


await addDoc(

collection(db,"members/snowflake/notes"),

{

text:input.value

}

);


input.value="";


loadNotes();


};




// =====================
// 경고 추가
// =====================


window.addWarning = async function(){


const input =
document.getElementById("warningInput");


if(input.value==="") return;


await addDoc(

collection(db,"members/snowflake/warnings"),

{

text:input.value

}

);


input.value="";


loadWarnings();


};




// =====================
// 불러오기
// =====================


async function loadNotes(){


const list =
document.getElementById("noteList");


list.innerHTML="";


const data =
await getDocs(

collection(db,"members/snowflake/notes")

);



data.forEach((doc)=>{


const div =
document.createElement("div");


div.className="record";


div.textContent =
doc.data().text;


list.appendChild(div);


});


}




async function loadWarnings(){


const list =
document.getElementById("warningList");


list.innerHTML="";


const data =
await getDocs(

collection(db,"members/snowflake/warnings")

);



data.forEach((doc)=>{


const div =
document.createElement("div");


div.className="record warning";


div.textContent =
"⚠ "+doc.data().text;


list.appendChild(div);


});


}



loadNotes();

loadWarnings();



</script>


</body>

</html>
