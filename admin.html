<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
TEAM FRONTIER ADMIN
</title>


<style>

/* =========================
RESET
========================= */

*{

box-sizing:border-box;

}


body{

margin:0;

padding:30px;

background:#212121;

color:white;

font-family:Arial, sans-serif;

}


/* =========================
TITLE
========================= */


h1{

color:#f7d18c;

letter-spacing:2px;

}


.subTitle{

margin-bottom:40px;

color:white;

}


/* =========================
BOX
========================= */


.box{

border:1px solid white;

padding:20px;

margin-bottom:25px;

background:#212121;

}



.title{

color:#f7d18c;

font-size:22px;

border-bottom:1px solid white;

padding-bottom:10px;

margin-bottom:20px;

}


/* =========================
INPUT
========================= */


textarea{

width:100%;

height:120px;

background:#212121;

color:white;

border:1px solid white;

padding:12px;

resize:vertical;

font-size:14px;

}



button{

margin-top:10px;

padding:10px 20px;

background:#212121;

color:#f7d18c;

border:1px solid white;

cursor:pointer;

}



button:hover{

background:#f7d18c;

color:#212121;

}


/* =========================
RECORD
========================= */


.record{

border:1px solid white;

padding:15px;

margin-top:15px;

}


.date{

color:#f7d18c;

font-size:13px;

}


.text{

margin-top:10px;

white-space:pre-line;

}



.delete{

margin-top:15px;

}


/* =========================
MOBILE
========================= */


@media(max-width:768px){


body{

padding:20px;

}


h1{

font-size:24px;

}


}


</style>


</head>



<body>


<h1>

TEAM FRONTIER

<br>

ADMIN CONTROL

</h1>


<p class="subTitle">

AUTHORIZED PERSONNEL ONLY

<br>

관리진 전용 기록 시스템

</p>



<!-- =========================
NOTE
========================= -->


<div class="box">


<div class="title">

📌 특이사항

</div>


<textarea id="noteInput"

placeholder="특이사항을 입력하세요">

</textarea>


<button id="noteAdd">

추가

</button>


<div id="noteList">

</div>


</div>




<!-- =========================
WARNING
========================= -->


<div class="box">


<div class="title">

⚠ 경고 기록

</div>


<textarea id="warningInput"

placeholder="경고 기록을 입력하세요">

</textarea>


<button id="warningAdd">

추가

</button>


<div id="warningList">

</div>


</div>




<!-- =========================
HISTORY
========================= -->


<div class="box">


<div class="title">

🎉 TEAM FRONTIER HISTORY

</div>


<textarea id="historyInput"

placeholder="기념일 / 주요 기록 입력">

</textarea>


<button id="historyAdd">

추가

</button>


<div id="historyList">

</div>


</div>

<script type="module">


/* =========================
FIREBASE
========================= */


import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import {

getFirestore,

collection,

addDoc,

getDocs,

deleteDoc

}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";




const firebaseConfig = {


apiKey: "AIzaSyCwxwFTyF-qam5EP-7FKXdWri4kanKZlyI",

authDomain: "teamfrontier-34b24.firebaseapp.com",

projectId: "teamfrontier-34b24",

storageBucket: "teamfrontier-34b24.firebasestorage.app",

messagingSenderId: "1053293310511",

appId: "1:1053293310511:web:001f2684244ff9ebb40cda"

};



const app = initializeApp(firebaseConfig);


const db = getFirestore(app);





/* =========================
DATE
========================= */


function getDate(){


const now = new Date();


return now.toLocaleDateString("ko-KR",{

year:"numeric",

month:"2-digit",

day:"2-digit"

});


}





/* =========================
INPUT
========================= */


const noteInput =
document.getElementById("noteInput");


const warningInput =
document.getElementById("warningInput");


const historyInput =
document.getElementById("historyInput");




/* =========================
BUTTON
========================= */


const noteAdd =
document.getElementById("noteAdd");


const warningAdd =
document.getElementById("warningAdd");


const historyAdd =
document.getElementById("historyAdd");


alert("JS 연결됨");





/* =========================
SAVE NOTE
========================= */


noteAdd.onclick = async function(){
noteAdd.onclick = async function(){

alert("버튼 눌림");


const text = noteInput.value.trim();


if(text==="") return;


try{


await addDoc(

collection(

db,

"adminRecords",

"notes"

),

{

date:getDate(),

text:text

}

);


noteInput.value="";


alert("특이사항 저장 완료");


}

catch(error){


alert(error.message);


}


};






/* =========================
SAVE WARNING
========================= */


warningAdd.onclick = async function(){


const text = warningInput.value.trim();


if(text==="") return;



await addDoc(

collection(

db,

"adminRecords",

"warnings"

),

{

date:getDate(),

text:text

}

);



warningInput.value="";


alert("경고 기록 저장 완료");


};






/* =========================
SAVE HISTORY
========================= */


historyAdd.onclick = async function(){


const text = historyInput.value.trim();


if(text==="") return;



await addDoc(

collection(

db,

"adminRecords",

"history"

),

{

date:getDate(),

text:text

}

);



historyInput.value="";


alert("기록 저장 완료");


};



/* =========================
LOAD DELETE FUNCTIONS
========================= */



const noteList =
document.getElementById("noteList");


const warningList =
document.getElementById("warningList");


const historyList =
document.getElementById("historyList");





/* =========================
CREATE RECORD
========================= */


function createRecord(list, item){


const data = item.data();


const box = document.createElement("div");


box.className="record";


box.innerHTML = `

<div class="date">

${data.date}

</div>


<div class="text">

${data.text}

</div>


<button class="delete">

삭제

</button>

`;



box.querySelector(".delete").onclick = async function(){


const result = confirm(

"정말 삭제하시겠습니까?"

);



if(!result) return;



await deleteDoc(item.ref);


box.remove();


};



list.appendChild(box);


}





/* =========================
LOAD
========================= */


async function loadRecords(){



noteList.innerHTML="";

warningList.innerHTML="";

historyList.innerHTML="";




const notes = await getDocs(

collection(

db,

"adminRecords",

"notes"

)

);



notes.forEach(function(item){


createRecord(

noteList,

item

);


});





const warnings = await getDocs(

collection(

db,

"adminRecords",

"warnings"

)

);



warnings.forEach(function(item){


createRecord(

warningList,

item

);


});





const history = await getDocs(

collection(

db,

"adminRecords",

"history"

)

);



history.forEach(function(item){


createRecord(

historyList,

item

);


});



}





loadRecords();



</script>



</body>


</html>
