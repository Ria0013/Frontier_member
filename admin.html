<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Team Frontier Admin
</title>


<style>


/* =========================
RESET
========================= */


*{

box-sizing:border-box;

}


body{

margin:0;

padding:30px;

background:#212121;

color:white;

font-family:"Arial", sans-serif;

}



/* =========================
TITLE
========================= */


h1{

color:#f7d18c;

font-size:28px;

letter-spacing:2px;

}


.subTitle{

color:#ffffff;

font-size:14px;

margin-bottom:40px;

}



/* =========================
BOX
========================= */


.adminBox{

border:1px solid #ffffff;

background:#212121;

padding:20px;

margin-bottom:25px;

}



/* =========================
SECTION TITLE
========================= */


.sectionTitle{

color:#f7d18c;

border-bottom:1px solid #ffffff;

padding-bottom:10px;

margin-bottom:20px;

}



/* =========================
MEMBER LIST
========================= */


.memberList{

display:flex;

flex-wrap:wrap;

gap:10px;

}



.memberButton{

border:1px solid #ffffff;

background:#212121;

color:white;

padding:12px 20px;

cursor:pointer;

}


.memberButton:hover{

color:#f7d18c;

}



/* =========================
INPUT
========================= */


textarea{

width:100%;

height:120px;

resize:vertical;

background:#212121;

color:white;

border:1px solid #ffffff;

padding:12px;

font-size:14px;

}



button{

background:#212121;

color:#f7d18c;

border:1px solid #ffffff;

padding:10px 20px;

margin-top:10px;

cursor:pointer;

}


button:hover{

background:#f7d18c;

color:#212121;

}



/* =========================
RECORD
========================= */


.record{

border:1px solid #ffffff;

padding:15px;

margin-top:10px;

}


.recordDate{

color:#f7d18c;

font-size:13px;

}


.recordText{

margin-top:8px;

white-space:pre-line;

}



/* =========================
STATUS
========================= */


#selectedMember{

color:#f7d18c;

font-size:20px;

margin-bottom:20px;

}



</style>


</head>



<body>



<h1>

TEAM FRONTIER

<br>

ADMIN CONTROL

</h1>


<p class="subTitle">

AUTHORIZED PERSONNEL ONLY

<br>

관리진 전용 시스템

</p>




<!-- =========================
MEMBER MANAGEMENT
========================= -->


<div class="adminBox">


<h2 class="sectionTitle">

MEMBER MANAGEMENT

</h2>


<div class="memberList">


<button class="memberButton">

눈꽃

</button>


<button class="memberButton">

후유

</button>


<button class="memberButton">

오애

</button>


<button class="memberButton">

슈팝

</button>


<button class="memberButton">

금꽃

</button>


<button class="memberButton">

셰인

</button>


</div>


</div>





<div id="selectedMember">

멤버를 선택해주세요

</div>





<!-- =========================
NOTE
========================= -->


<div class="adminBox">


<h2 class="sectionTitle">

📌 특이사항

</h2>


<textarea id="noteInput"
placeholder="특이사항 기록 입력">

</textarea>


<button>

추가

</button>


<div id="noteList">

</div>


</div>





<!-- =========================
WARNING
========================= -->


<div class="adminBox">


<h2 class="sectionTitle">

⚠ 경고 기록

</h2>


<textarea id="warningInput"
placeholder="경고 기록 입력">

</textarea>


<button>

추가

</button>


<div id="warningList">

</div>


</div>





<!-- =========================
HISTORY
========================= -->


<div class="adminBox">


<h2 class="sectionTitle">

🎉 TEAM FRONTIER HISTORY

</h2>


<textarea id="historyInput"
placeholder="Team Frontier 기록 입력">

</textarea>


<button>

추가

</button>


<div id="historyList">

</div>


</div>


<script type="module">


/* =========================
FIREBASE
========================= */


import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import {

getFirestore,

collection,

addDoc

}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";




const firebaseConfig = {


apiKey: "AIzaSyCwxwFTyF-qam5EP-7FKXdWri4kanKZlyI",

authDomain: "teamfrontier-34b24.firebaseapp.com",

projectId: "teamfrontier-34b24",

storageBucket: "teamfrontier-34b24.firebasestorage.app",

messagingSenderId: "1053293310511",

appId: "1:1053293310511:web:001f2684244ff9ebb40cda"


};



const app = initializeApp(firebaseConfig);


const db = getFirestore(app);




/* =========================
CURRENT MEMBER
========================= */


let currentMember = "";




const selectedMember =
document.getElementById("selectedMember");




/* =========================
MEMBER SELECT
========================= */


const memberButtons =
document.querySelectorAll(".memberButton");



memberButtons.forEach(function(button){


button.onclick=function(){


currentMember = button.textContent.trim();


selectedMember.textContent =

"선택된 멤버 : " + currentMember;



};


});





/* =========================
DATE
========================= */


function getDate(){


const now = new Date();


return now.toLocaleDateString("ko-KR",{

year:"numeric",

month:"2-digit",

day:"2-digit"

});


}





/* =========================
NOTE SAVE
========================= */


const noteInput =
document.getElementById("noteInput");



const noteButton =
noteInput.nextElementSibling;



noteButton.onclick = async function(){



if(currentMember===""){


alert("멤버를 선택해주세요.");

return;


}



if(noteInput.value.trim()==="") return;




await addDoc(

collection(

db,

"members",

currentMember,

"notes"

),

{


date:getDate(),

text:noteInput.value.trim()


}


);



noteInput.value="";



alert("특이사항 저장 완료");


};






/* =========================
WARNING SAVE
========================= */


const warningInput =
document.getElementById("warningInput");

const warningButton =
warningInput.nextElementSibling;


warningButton.onclick = async function(){


if(currentMember===""){


alert("멤버를 선택해주세요.");

return;


}



if(warningInput.value.trim()==="") return;




await addDoc(

collection(

db,

"members",

currentMember,

"warnings"

),

{

date:getDate(),

text:warningInput.value.trim()

}

);



warningInput.value="";


alert("경고 기록 저장 완료");


};





/* =========================
HISTORY SAVE
========================= */


const historyInput =
document.getElementById("historyInput");



const historyButton =
historyInput.nextElementSibling;



historyButton.onclick = async function(){


if(historyInput.value.trim()==="") return;



await addDoc(

collection(

db,

"history"

),

{

date:getDate(),

text:historyInput.value.trim()

}

);



historyInput.value="";


alert("기록장 저장 완료");


};


/* =========================
FIRESTORE LOAD
========================= */


import {

getDocs,

collection,

deleteDoc,

doc

}

from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";





const noteList =
document.getElementById("noteList");


const warningList =
document.getElementById("warningList");


const historyList =
document.getElementById("historyList");





/* =========================
LOAD MEMBER RECORD
========================= */


async function loadMemberRecords(){


if(currentMember==="") return;



noteList.innerHTML="";

warningList.innerHTML="";




const notes = await getDocs(

collection(

db,

"members",

currentMember,

"notes"

)

);



notes.forEach(function(item){


createRecord(

noteList,

item,

"note"

);


});




const warnings = await getDocs(

collection(

db,

"members",

currentMember,

"warnings"

)

);



warnings.forEach(function(item){


createRecord(

warningList,

item,

"warning"

);


});


}





/* =========================
LOAD HISTORY
========================= */


async function loadHistory(){


historyList.innerHTML="";



const history = await getDocs(

collection(

db,

"history"

)

);



history.forEach(function(item){


createRecord(

historyList,

item,

"history"

);


});


}






/* =========================
CREATE RECORD
========================= */


function createRecord(list,item,type){


const data=item.data();



const box=document.createElement("div");


box.className="record";



box.innerHTML=`

<div class="recordDate">

${data.date}

</div>


<div class="recordText">

${data.text}

</div>


<button class="deleteBtn">

삭제

</button>

`;




box.querySelector(".deleteBtn").onclick=

async function(){


const check =
confirm("정말 삭제하시겠습니까?");


if(!check) return;



await deleteDoc(

item.ref

);



box.remove();


};




list.appendChild(box);


}





/* =========================
MEMBER CLICK UPDATE
========================= */


memberButtons.forEach(function(button){


button.addEventListener(

"click",

function(){


setTimeout(function(){


loadMemberRecords();


},100);



}

);


});





/* =========================
START
========================= */


loadHistory();


</script>

</body>


</html>
